<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poker Ledger - Join or Create Club</title>
    
    <!-- Tailwind CSS (for modern structural utilities, with custom color controls) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top, #1c1917 0%, #0c0a09 100%);
            min-height: 100vh;
            color: #f5f5f4;
            overflow-x: hidden;
        }
        
        .gold-glow {
            text-shadow: 0 0 12px rgba(234, 179, 8, 0.4);
        }
        
        .gold-border-glow:focus {
            border-color: #eab308 !important;
            box-shadow: 0 0 15px rgba(234, 179, 8, 0.2);
        }
        
        .luxury-card {
            background: rgba(28, 25, 23, 0.65);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(234, 179, 8, 0.15);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }
        
        .active-tab {
            border-bottom: 2px solid #eab308;
            color: #eab308;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4 sm:p-6 md:p-8">

    <div class="w-full max-w-md my-8">
        <!-- Logo & Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-stone-900 border border-yellow-500/30 shadow-lg mb-3 shadow-yellow-500/10">
                <span class="text-3xl text-yellow-500 font-serif">♠</span>
            </div>
            <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-yellow-500 via-amber-400 to-yellow-600 bg-clip-text text-transparent">
                POKER LEDGER
            </h1>
            <p class="text-stone-400 text-sm mt-1">Premium Club Isolation & Live Game Tracking</p>
        </div>

        {% if error %}
        <div class="mb-6 p-4 rounded-xl bg-red-950/40 border border-red-500/30 text-red-300 text-sm flex items-center gap-3">
            <svg class="w-5 h-5 flex-shrink-0 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
            </svg>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <!-- Tab Controls -->
        <div class="flex border-b border-stone-800 mb-6 text-center text-sm font-semibold">
            <button onclick="switchTab('enter')" id="tab-enter" class="flex-1 pb-3 text-stone-400 hover:text-stone-200 transition-colors active-tab">
                Enter Existing Club
            </button>
            <button onclick="switchTab('create')" id="tab-create" class="flex-1 pb-3 text-stone-400 hover:text-stone-200 transition-colors">
                Create New Club
            </button>
        </div>

        <!-- Enter Club Form -->
        <div id="form-enter" class="luxury-card rounded-2xl p-6 sm:p-8 space-y-6">
            <form action="/enter-club" method="POST" class="space-y-5">
                <div class="space-y-2">
                    <label for="enter_code" class="block text-xs font-semibold uppercase tracking-wider text-stone-400">
                        Club Code
                    </label>
                    <input type="text" id="enter_code" name="club_code" required placeholder="e.g., ROYALS"
                        style="text-transform: uppercase;"
                        class="w-full bg-stone-900 border border-stone-800 rounded-xl px-4 py-3 text-center text-xl font-bold tracking-widest text-yellow-500 placeholder-stone-600 focus:outline-none gold-border-glow transition-all">
                </div>
                
                <button type="submit" class="w-full bg-gradient-to-r from-yellow-600 to-amber-500 hover:from-yellow-500 hover:to-amber-400 text-stone-950 font-bold py-3.5 px-4 rounded-xl shadow-lg shadow-yellow-600/10 transition-all flex items-center justify-center gap-2 group">
                    <span>Enter Club Room</span>
                    <svg class="w-4 h-4 transform group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/>
                    </svg>
                </button>
            </form>
        </div>

        <!-- Create Club Form -->
        <div id="form-create" class="luxury-card rounded-2xl p-6 sm:p-8 space-y-6 hidden">
            <form action="/create-club" method="POST" class="space-y-5">
                <div class="space-y-2">
                    <label for="create_name" class="block text-xs font-semibold uppercase tracking-wider text-stone-400">
                        Club Name
                    </label>
                    <input type="text" id="create_name" name="club_name" required placeholder="e.g., Royal Poker Club"
                        class="w-full bg-stone-900 border border-stone-800 rounded-xl px-4 py-3 text-stone-100 placeholder-stone-600 focus:outline-none gold-border-glow transition-all text-sm">
                </div>

                <div class="space-y-2">
                    <div class="flex justify-between items-center">
                        <label for="create_code" class="block text-xs font-semibold uppercase tracking-wider text-stone-400">
                            Custom Code <span class="text-[10px] text-stone-500 lowercase font-normal">(optional)</span>
                        </label>
                    </div>
                    <input type="text" id="create_code" name="club_code" placeholder="Leave blank to auto-generate"
                        maxlength="6" style="text-transform: uppercase;"
                        class="w-full bg-stone-900 border border-stone-800 rounded-xl px-4 py-3 text-sm tracking-wider text-stone-100 placeholder-stone-600 focus:outline-none gold-border-glow transition-all">
                </div>

                <div class="space-y-2">
                    <label for="host_pin" class="block text-xs font-semibold uppercase tracking-wider text-stone-400">
                        Host Admin PIN
                    </label>
                    <input type="password" id="host_pin" name="host_pin" required placeholder="Set a PIN for Host Actions"
                        pattern="[0-9]*" inputmode="numeric"
                        class="w-full bg-stone-900 border border-stone-800 rounded-xl px-4 py-3 text-center text-lg font-bold tracking-widest text-stone-100 placeholder-stone-600 focus:outline-none gold-border-glow transition-all text-sm">
                    <p class="text-[10px] text-stone-500">Required to start live games, record sessions, or kick players.</p>
                </div>
                
                <button type="submit" class="w-full bg-gradient-to-r from-yellow-600 to-amber-500 hover:from-yellow-500 hover:to-amber-400 text-stone-950 font-bold py-3.5 px-4 rounded-xl shadow-lg shadow-yellow-600/10 transition-all flex items-center justify-center gap-2 group">
                    <span>Initialize Club</span>
                    <svg class="w-4 h-4 transform group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
                    </svg>
                </button>
            </form>
        </div>

        <p class="text-center text-xs text-stone-600 mt-6">
            Poker Ledger uses isolated JSON storage files per club code to preserve total privacy.
        </p>
    </div>

    <script>
        function switchTab(tab) {
            const tabEnter = document.getElementById('tab-enter');
            const tabCreate = document.getElementById('tab-create');
            const formEnter = document.getElementById('form-enter');
            const formCreate = document.getElementById('form-create');

            if (tab === 'enter') {
                tabEnter.classList.add('active-tab');
                tabCreate.classList.remove('active-tab');
                formEnter.classList.remove('hidden');
                formCreate.classList.add('hidden');
            } else {
                tabCreate.classList.add('active-tab');
                tabEnter.classList.remove('active-tab');
                formCreate.classList.remove('hidden');
                formEnter.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
