<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poker Ledger - Host Verification</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top, #1c1917 0%, #0c0a09 100%);
            min-height: 100vh;
            color: #f5f5f4;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        
        .luxury-card {
            background: rgba(28, 25, 23, 0.65);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(234, 179, 8, 0.15);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }
        
        .gold-border-glow:focus {
            border-color: #eab308 !important;
            box-shadow: 0 0 15px rgba(234, 179, 8, 0.2);
        }
    </style>
</head>
<body>

    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-stone-900 border border-yellow-500/20 shadow-lg mb-3">
                <span class="text-2xl text-yellow-500">🔒</span>
            </div>
            <h1 class="text-2xl font-bold tracking-tight text-stone-100">
                Host Authorization Required
            </h1>
            <p class="text-stone-400 text-xs mt-1">Please enter the Host Admin PIN for club <strong>{{ club_name }}</strong></p>
        </div>

        {% if error %}
        <div class="mb-6 p-4 rounded-xl bg-red-950/40 border border-red-500/30 text-red-300 text-sm flex items-center gap-3">
            <svg class="w-5 h-5 flex-shrink-0 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
            </svg>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <div class="luxury-card rounded-2xl p-6 sm:p-8 space-y-6">
            <form action="/club/{{ club_code }}/verify-host" method="POST" class="space-y-5">
                <input type="hidden" name="next_url" value="{{ next_url }}">
                
                <div class="space-y-2">
                    <label for="host_pin" class="block text-xs font-semibold uppercase tracking-wider text-stone-400 text-center">
                        Host Admin PIN
                    </label>
                    <input type="password" id="host_pin" name="host_pin" required placeholder="••••"
                        pattern="[0-9]*" inputmode="numeric" autofocus
                        class="w-full bg-stone-900 border border-stone-800 rounded-xl px-4 py-3.5 text-center text-2xl font-bold tracking-widest text-yellow-500 placeholder-stone-700 focus:outline-none gold-border-glow transition-all">
                </div>
                
                <button type="submit" class="w-full bg-gradient-to-r from-yellow-600 to-amber-500 hover:from-yellow-500 hover:to-amber-400 text-stone-950 font-bold py-3 px-4 rounded-xl shadow-lg shadow-yellow-600/10 transition-all flex items-center justify-center gap-2 group">
                    <span>Unlock Host Controls</span>
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z"/>
                    </svg>
                </button>
            </form>
            
            <div class="text-center pt-2">
                <a href="/club/{{ club_code }}/" class="text-stone-500 hover:text-stone-300 text-xs transition-colors">
                    ← Back to Dashboard
                </a>
            </div>
        </div>
    </div>

</body>
</html>
